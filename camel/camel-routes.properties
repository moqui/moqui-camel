# Default DataSource name registered by CamelToolFactory.
camel.sql.datasource=moquiDataSource

# Outbound route defaults: query DeviceRequestItem + Parameter (mirrors run#DeviceRequest read path).
# Safe for local testing against seeded data; override in runtime/conf/camel*.properties
# or with JVM system properties prefixed with -Dmoqui.camel.
outbound.sql.query=SELECT dri.PARAMETER_ID as "parameterId", p.NUMERIC_VALUE as "numericValue", p.SYMBOLIC_VALUE as "symbolicValue" FROM DEVICE_REQUEST_ITEM dri JOIN PARAMETER p ON p.PARAMETER_ID = dri.PARAMETER_ID WHERE dri.REQUEST_NAME = :#requestName ORDER BY dri.SEQUENCE_NUM
outbound.publish.uri=seda:moquiOutbound?waitForTaskToComplete=Never
outbound.afterPublish.enabled=true
outbound.afterPublish.uri=seda:moquiOutboundAudit?waitForTaskToComplete=Never

# Inbound route defaults: receive JSON and insert a ParameterLog row.
# The route enriches the unmarshalled JSON body with parameterLogId on the fly if it is missing.
inbound.route.autoStartup=true
inbound.consume.uri=seda:moquiInbound
inbound.sql.uri=sql:INSERT INTO PARAMETER_LOG (PARAMETER_LOG_ID, PARAMETER_ID, OBSERVED_DATE, NUMERIC_VALUE) VALUES (:#parameterLogId, :#parameterId, CURRENT_TIMESTAMP, :#numericValue)?dataSource=#{{camel.sql.datasource}}
inbound.afterDb.enabled=true
inbound.afterDb.uri=seda:moquiInboundNotify?waitForTaskToComplete=Never

# Recipe export route: DeviceRuleSet → DeviceRule → DeviceConfig → Parameter + ParameterDef.
# Produces Codesys txt recipe lines "parameterName:=parameterValue" ordered by parameterCode.
# Named parameters :#deviceRuleSetId and :#deviceId come from the service in-parameters.
# Note: dc.device_id does not exist — the filter is on dr.device_id (DeviceRule has deviceId).
#       p.parameter_name does NOT exist — parameterName comes from ParameterDef via JOIN.
recipe.sql.query=SELECT COALESCE(p.PARAMETER_ALIAS, pd.PARAMETER_NAME) AS "parameterName", \
    CASE WHEN p.NUMERIC_VALUE IS NOT NULL THEN CAST(p.NUMERIC_VALUE AS VARCHAR(50)) \
         WHEN p.PARAMETER_ENUM_ID IS NOT NULL THEN p.PARAMETER_ENUM_ID \
         ELSE p.SYMBOLIC_VALUE END AS "parameterValue" \
    FROM DEVICE_RULE_SET drs \
    INNER JOIN DEVICE_RULE dr ON drs.DEVICE_RULE_SET_ID = dr.DEVICE_RULE_SET_ID \
    INNER JOIN DEVICE_CONFIG dc ON dr.DEVICE_CONFIG_ID = dc.DEVICE_CONFIG_ID \
    INNER JOIN PARAMETER p ON dc.DEVICE_CONFIG_ID = p.DEVICE_CONFIG_ID \
    INNER JOIN PARAMETER_DEF pd ON p.PARAMETER_DEF_ID = pd.PARAMETER_DEF_ID \
    WHERE drs.DEVICE_RULE_SET_ID = :#deviceRuleSetId \
    AND dr.DEVICE_ID = :#deviceId \
    ORDER BY pd.PARAMETER_CODE

# Output file name (set as CamelFileName header; file: and sftp: components use it automatically).
recipe.filename=recipe.txt

# File-transfer destination (primary PLC). Default uses SEDA so tests work without filesystem or SSH.
# Override in runtime/conf/camel*.properties for real transfers.
file.transfer.uri=seda:moquiRecipeOutput?waitForTaskToComplete=Never
# file.transfer.uri=file:/tmp/recipes
# file.transfer.uri=sftp:admin@plc1.host:22/recipe

# Optional secondary PLC for redundant delivery (same recipe file sent to both PLCs).
# Set file.transfer.uri.2.enabled=true and configure file.transfer.uri.2 for production.
file.transfer.uri.2.enabled=false
file.transfer.uri.2=seda:moquiRecipeOutput2?waitForTaskToComplete=Never
# file.transfer.uri.2=sftp:admin@plc2.host:22/recipe

